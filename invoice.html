<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice — DB Handicrafts</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --accent:      #E65C00;
  --accent-dark: #C2410C;
  --accent-pale: #FFF7ED;
  --ink:         #1A1A1A;
  --ink2:        #6B6B6B;
  --ink3:        #ABABAB;
  --line:        #EBEBEB;
  --font:        'Plus Jakarta Sans', sans-serif;
  --mono:        'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: #E8E6E0; color: var(--ink); padding: 24px 16px 48px; font-size: 13px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
.invoice { background: #fff; width: 100%; max-width: 640px; margin: 0 auto; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 24px rgba(0,0,0,0.10); }
.inv-head { background: var(--accent); padding: 22px 28px 18px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.brand-name { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -0.3px; line-height: 1; }
.brand-sub { font-size: 10px; color: rgba(255,255,255,0.65); margin-top: 3px; font-weight: 500; }
.inv-meta { text-align: right; }
.inv-title { font-size: 19px; font-weight: 800; color: #fff; letter-spacing: -0.5px; text-transform: uppercase; line-height: 1; }
.inv-id { font-size: 10px; font-family: var(--mono); color: rgba(255,255,255,0.65); margin-top: 3px; }
.status-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 9px; font-weight: 800; letter-spacing: 1.8px; text-transform: uppercase; padding: 4px 9px; border-radius: 3px; margin-top: 6px; }
.badge-dp    { background: #FFF7ED; color: var(--accent-dark); }
.badge-lunas { background: #fff;    color: var(--accent); }
.acc-line { height: 3px; background: var(--accent-dark); }
.inv-body { padding: 20px 28px; }
.info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px; }
.info-lbl { font-size: 8.5px; font-weight: 700; color: var(--ink3); text-transform: uppercase; letter-spacing: 1.4px; font-family: var(--mono); margin-bottom: 4px; }
.info-val { font-size: 12px; font-weight: 600; color: var(--ink); line-height: 1.5; }
.info-val small { display: block; font-size: 11px; color: var(--ink2); font-weight: 400; }
table { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
thead tr { background: var(--ink); }
thead th { font-size: 8.5px; font-weight: 700; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 1.4px; padding: 8px 10px; text-align: left; font-family: var(--mono); }
thead th:nth-child(2), thead th:nth-child(3) { text-align: center; }
thead th:last-child { text-align: right; }
tbody tr { border-bottom: 1px solid var(--line); }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 8px 10px; font-size: 12px; color: var(--ink); vertical-align: middle; }
tbody td:nth-child(2), tbody td:nth-child(3) { text-align: center; color: var(--ink2); font-size: 11px; }
tbody td:last-child { text-align: right; font-weight: 600; font-family: var(--mono); font-size: 12px; }
.item-name { font-weight: 600; font-size: 12px; }
.item-varian { font-size: 10px; color: var(--ink3); margin-top: 1px; font-family: var(--mono); }
.total-wrap { display: flex; justify-content: flex-end; margin-bottom: 14px; }
.total-box { width: 220px; }
.t-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--line); font-size: 11px; }
.t-row:last-child { border-bottom: none; }
.t-row span { color: var(--ink2); }
.t-row b { color: var(--ink); font-weight: 600; font-family: var(--mono); }
.t-dp { display: flex; justify-content: space-between; padding: 8px 11px; background: #FFF7ED; border: 1px solid #FDBA74; border-radius: 6px; margin-top: 6px; font-size: 11px; }
.t-dp span { color: var(--accent-dark); font-weight: 600; }
.t-dp b { font-family: var(--mono); font-weight: 700; color: var(--accent-dark); }
.t-sisa { display: flex; justify-content: space-between; padding: 8px 11px; background: #FEF2F2; border: 1px solid #F09595; border-radius: 6px; margin-top: 4px; font-size: 11px; }
.t-sisa span { color: #A32D2D; font-weight: 600; }
.t-sisa b { font-family: var(--mono); font-weight: 700; color: #A32D2D; }
.t-grand { display: flex; justify-content: space-between; background: var(--accent); padding: 9px 11px; border-radius: 7px; margin-top: 6px; }
.t-grand span { color: rgba(255,255,255,0.75); font-weight: 600; font-size: 11px; }
.t-grand b { font-size: 15px; font-weight: 800; color: #fff; font-family: var(--mono); }
.note-box { border-left: 3px solid var(--accent); padding: 7px 12px; background: #FAFAFA; border-radius: 0 6px 6px 0; margin-bottom: 0; }
.note-lbl { font-size: 8.5px; color: var(--ink3); text-transform: uppercase; letter-spacing: 1.2px; font-family: var(--mono); margin-bottom: 2px; }
.note-val { font-size: 11px; color: var(--ink2); font-style: italic; line-height: 1.6; }
.inv-foot-top { border-top: 1px solid var(--line); padding: 12px 28px; display: flex; align-items: center; justify-content: space-between; gap: 10px; background: #fff; }
.foot-thank { font-size: 12px; font-weight: 700; color: var(--ink); }
.foot-brand { font-size: 10px; color: var(--ink3); }
.inv-foot-bottom { background: var(--ink); padding: 12px 28px; display: flex; align-items: center; gap: 16px; }
.foot-item { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.foot-item.wa { color: rgba(255,255,255,0.9); font-weight: 600; }
.foot-item.site { color: rgba(255,255,255,0.5); }
.foot-item svg { flex-shrink: 0; }
.foot-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.15); }
.print-bar { max-width: 640px; margin: 14px auto 0; display: flex; justify-content: center; }
.btn-print { padding: 10px 22px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--font); display: flex; align-items: center; gap: 6px; }
.btn-print:hover { background: var(--accent-dark); }
.btn-print svg { width: 13px; height: 13px; }
@media print {
  body { background: white; padding: 0; }
  .invoice { box-shadow: none; border-radius: 0; max-width: 100%; }
  .print-bar { display: none; }
  @page { size: A4; margin: 10mm 12mm; }
}
@media (max-width: 480px) {
  .inv-head, .inv-body, .inv-foot-top, .inv-foot-bottom { padding-left: 18px; padding-right: 18px; }
  .info-row { grid-template-columns: 1fr; }
  .inv-foot-top { flex-direction: column; align-items: flex-start; }
  thead th:nth-child(3), tbody td:nth-child(3) { display: none; }
}
</style>
</head>
<body>

<div class="print-bar">
  <button class="btn-print" onclick="window.print()">
    <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    Cetak / Simpan PDF
  </button>
</div>

<div class="invoice">

  <div class="inv-head">
    <div>
      <img src="https://blogger.googleusercontent.com/img/a/AVvXsEgbwnWjoaubY13Cn2wkEpf_3Z-2RimVg-Bgcl5ldLH7M12rfWNrZzL9Rli1S7-dfu9iWGoZbbd8DZtjhahIFi0GIvsog-E5d5pKzBqP_qDwI18iChQUm5sfx8wyDa-7Q9MZf67RHqAleyik1DuF58ZBJZ3khDZO2SZZmBwmYQbSHQCt5wmQ2UfXokDnVF8" alt="DB Handicrafts" style="height:38px;width:auto;max-width:140px;object-fit:contain;display:block;">
      <div class="brand-sub">Kerajinan Tangan · Purworejo</div>
    </div>
    <div class="inv-meta">
      <div class="inv-title">Invoice</div>
      <div class="inv-id" id="inv-id">—</div>
      <div class="inv-id" id="inv-tgl">—</div>
      <div class="status-badge badge-dp" id="inv-badge">◑ PEMBAYARAN SEBAGIAN</div>
    </div>
  </div>

  <div class="acc-line"></div>

  <div class="inv-body">

    <div class="info-row">
      <div>
        <div class="info-lbl">Pembeli</div>
        <div class="info-val">
          <span id="inv-nama" style="font-size:13px;font-weight:700">—</span>
          <small id="inv-hp">—</small>
        </div>
      </div>
      <div>
        <div class="info-lbl">Alamat Kirim</div>
        <div class="info-val">
          <span id="inv-prov" style="font-weight:700;font-size:13px">—</span>
          <small id="inv-alamat">—</small>
          <small id="inv-kurir" style="margin-top:2px">—</small>
        </div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Produk</th>
          <th>Qty</th>
          <th>Harga</th>
          <th>Subtotal</th>
        </tr>
      </thead>
      <tbody id="inv-items">
        <tr><td colspan="4" style="text-align:center;color:#ABABAB;padding:16px">Memuat data...</td></tr>
      </tbody>
    </table>

    <div class="total-wrap">
      <div class="total-box" id="inv-total-box">
        <div class="t-row"><span>Total</span><b id="inv-total">—</b></div>
      </div>
    </div>

    <div class="note-box" id="inv-note-wrap" style="display:none">
      <div class="note-lbl">Catatan</div>
      <div class="note-val" id="inv-note"></div>
    </div>

  </div>

  <div class="inv-foot-top">
    <div class="foot-thank">Terima kasih sudah berbelanja 🙏</div>
    <div class="foot-brand">DB Handicrafts · Purworejo, Jawa Tengah</div>
  </div>

  <div class="inv-foot-bottom">
    <div class="foot-item wa">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.28h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      0812-3456-7890
    </div>
    <div class="foot-divider"></div>
    <div class="foot-item site">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      www.dbhandicrafts.com
    </div>
  </div>

</div>

<script>
(function(){
  var p = new URLSearchParams(window.location.search);

  function set(id, val) {
    var e = document.getElementById(id);
    if (e && val) e.textContent = val;
  }

  function fmtRp(val) {
    if (!val) return 'Rp 0';
    var n = parseInt(val.toString().replace(/[^0-9]/g, '')) || 0;
    return 'Rp ' + n.toLocaleString('id-ID');
  }

  // Header
  set('inv-id',    p.get('orderid'));
  set('inv-tgl',   p.get('tanggal'));
  set('inv-nama',  p.get('nama'));
  set('inv-hp',    p.get('wa'));
  set('inv-prov',  p.get('prov') || p.get('alamat'));
  set('inv-alamat',p.get('alamat'));
  set('inv-kurir', p.get('kurir'));

  // Status badge — dp atau lunas
  var status = (p.get('status') || '').toLowerCase();
  var badge  = document.getElementById('inv-badge');
  if (status === 'lunas' || status === 'paid') {
    badge.className = 'status-badge badge-lunas';
    badge.textContent = '✓ LUNAS';
  } else {
    badge.className = 'status-badge badge-dp';
    badge.textContent = '◑ PEMBAYARAN SEBAGIAN';
  }

  // Items
  var raw = p.get('items');
  var totalHitung = 0;
  if (raw) {
    try {
      var items = JSON.parse(decodeURIComponent(raw));
      var tb = document.getElementById('inv-items');
      if (tb && items.length) {
        tb.innerHTML = items.map(function(it) {
          var sub = (it.p || 0) * (it.q || 1);
          totalHitung += sub;
          var fmt = function(n) { return 'Rp ' + Math.round(n).toLocaleString('id-ID'); };
          var varianHtml = it.v ? '<div class="item-varian">' + it.v + '</div>' : '';
          return '<tr><td><div class="item-name">' + it.n + '</div>' + varianHtml + '</td>' +
                 '<td>' + it.q + '</td>' +
                 '<td>' + fmt(it.p) + '</td>' +
                 '<td>' + fmt(sub) + '</td></tr>';
        }).join('');
      }
    } catch(e) {}
  }

  // Total
  var totalParam = p.get('total') || '';
  var totalNum   = parseInt(totalParam.replace(/[^0-9]/g, '')) || totalHitung;
  var dpParam    = p.get('dp')   || '';
  var sisaParam  = p.get('sisa') || '';
  var ongkir     = p.get('ongkir') || '0';

  var box = document.getElementById('inv-total-box');
  if (status === 'lunas' || status === 'paid') {
    box.innerHTML =
      '<div class="t-row"><span>Subtotal</span><b>' + fmtRp(totalHitung || totalNum) + '</b></div>' +
      '<div class="t-row"><span>Ongkir</span><b>' + fmtRp(ongkir) + '</b></div>' +
      '<div class="t-grand"><span>Total Dibayar</span><b>' + fmtRp(totalParam || totalNum) + '</b></div>';
  } else {
    // DP mode
    var dpNum   = parseInt(dpParam.replace(/[^0-9]/g, '')) || 0;
    var sisaNum = parseInt(sisaParam.replace(/[^0-9]/g, '')) || 0;
    var html =
      '<div class="t-row"><span>Subtotal</span><b>' + fmtRp(totalHitung || totalNum) + '</b></div>' +
      '<div class="t-row"><span>Ongkir</span><b>' + fmtRp(ongkir) + '</b></div>' +
      '<div class="t-row" style="border:none"><span>Total</span><b>' + fmtRp(totalParam || totalNum) + '</b></div>';
    if (dpNum > 0) {
      html += '<div class="t-dp"><span>DP Dibayar</span><b>' + fmtRp(dpNum) + '</b></div>';
    }
    if (sisaNum > 0) {
      html += '<div class="t-sisa"><span>Sisa Tagihan</span><b>' + fmtRp(sisaNum) + '</b></div>';
    }
    box.innerHTML = html;
  }

  // Catatan
  var pesan = p.get('pesan') || '';
  if (pesan) {
    document.getElementById('inv-note-wrap').style.display = 'block';
    set('inv-note', pesan);
  }

})();
</script>
</body>
</html>
